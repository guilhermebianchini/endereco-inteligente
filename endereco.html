<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style/endereco.css">

    <title>Cadastro de Endereço</title>
</head>
<body>

    <div class="formulario">
        <h1>Cadastro de Endereço</h1>

        <form id="formEndereco">
            <div class="dados">
                <label for="rua">Rua:</label>
                <input type="text" id="logradouro" required>
            </div>
            <div class="dados">
                <label for="numero">Número:</label>
                <input type="text" id="numero" required>
            </div>
            <div class="dados">
                <label for="cidade">Cidade:</label>
                <input type="text" id="cidade" required>
            </div>
            <div class="dados">
                <label for="estado">Estado:</label>
                <input type="text" id="uf" maxlength="2" required>
            </div>
            <div class="dados">
                <label for="cep">CEP:</label>
                <input type="text" id="cep" maxlength="9" required>
            </div>

            <button type="submit">Enviar</button>
        </form>
    </div>

    <script src="script/endereco.js"></script>
</body>
</html>
